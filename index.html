<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Recommendation Engine</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- =============================
       TODO: Customize this for YOUR concept!
       Options: Study Tips, Fitness Coach, 
       Outfit Recommender, Productivity Booster, 
       or Travel Suggestions
  ============================== -->

    <nav>
      <h2>AI Recommendation Engine</h2>
      <span>Powered by AI</span>
    </nav>

    <section class="hero">
      <h1>Your AI-Powered Recommendation Engine</h1>
      <p>Ask a style question and get a trend-aware outfit recommendation.</p>

      <!-- =============================
         REQUIRED ELEMENTS (Don't remove these IDs!)
         - Input box (id="userInput")
         - Submit button (id="askBtn")
         - Display area (id="response")
    ============================== -->

      <div class="ai-card">
        <div class="input-row">
          <input
            type="text"
            id="userInput"
            placeholder="Ex: Suggest an outfit for a rainy spring concert"
          />
          <button id="askBtn">Get Look</button>
        </div>
        <p class="helper-text">
          Try: "Brunch outfit under $100" or "Streetwear for cool weather"
        </p>
        <div id="response" aria-live="polite"></div>
        <button id="clearBtn" class="clear-btn" type="button">
          Clear Chat
        </button>
      </div>
    </section>

    <footer>© 2026 LiveLab 10. Educational Use Only.</footer>
    <script src="secrets.js"></script>
    <script src="script.js"></script>
  </body>
</html>
